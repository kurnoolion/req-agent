<div class="card mt-2">
    <div class="card-header d-flex justify-content-between align-items-center py-2">
        <span class="fw-semibold small"><i class="bi bi-clipboard-data me-1"></i>RES-CHK Report</span>
        <button type="button" class="btn btn-sm btn-outline-secondary"
                onclick="navigator.clipboard.writeText(document.getElementById('rr-report-text').textContent)
                         .then(()=>this.textContent='Copied!').catch(()=>{})">
            <i class="bi bi-clipboard me-1"></i>Copy
        </button>
    </div>
    <div class="card-body p-2">
        <pre id="rr-report-text" class="mb-0 small" style="white-space:pre-wrap;word-break:break-all;">{{ report }}</pre>
    </div>
</div>
