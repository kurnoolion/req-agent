<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NORA{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1VT6o2VGFq0JJw2yERRFgMEiDo1y3e"
          crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"
          integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb2AbKsAI5/WVXo2GnR"
          crossorigin="anonymous">

    <!-- Custom styles -->
    <link href="{{ root_path }}/static/css/style.css" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body data-root-path="{{ root_path }}">

    <!-- Top navbar -->
    <nav class="top-navbar navbar navbar-dark bg-dark px-3">
        <div class="d-flex align-items-center">
            <button class="btn btn-dark d-md-none me-2" type="button"
                    onclick="document.querySelector('.sidebar').classList.toggle('show')">
                <i class="bi bi-list"></i>
            </button>
            <a class="navbar-brand mb-0" href="{{ root_path }}/">NORA</a>
            <span class="text-muted small ms-2 d-none d-sm-inline">Network Operator Requirements Analyzer</span>
        </div>
        <div class="d-flex align-items-center text-light small">
            <span id="system-status-dot" class="status-dot unknown"></span>
            <span id="system-status-label">Checking...</span>
        </div>
    </nav>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-heading">Navigation</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% block nav_dashboard %}{% endblock %}"
                   href="{{ root_path }}/">
                    <i class="bi bi-speedometer2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% block nav_pipeline %}{% endblock %}"
                   href="{{ root_path }}/pipeline">
                    <i class="bi bi-diagram-3"></i>Pipeline
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% block nav_jobs %}{% endblock %}"
                   href="{{ root_path }}/jobs">
                    <i class="bi bi-list-task"></i>Jobs
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% block nav_query %}{% endblock %}"
                   href="{{ root_path }}/query">
                    <i class="bi bi-search"></i>Query
                </a>
            </li>
        </ul>

        <div class="sidebar-heading">Settings</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% block nav_environments %}{% endblock %}"
                   href="{{ root_path }}/environments">
                    <i class="bi bi-gear"></i>Environments
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% block nav_files %}{% endblock %}"
                   href="{{ root_path }}/files">
                    <i class="bi bi-folder2-open"></i>Files
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% block nav_metrics %}{% endblock %}"
                   href="{{ root_path }}/metrics">
                    <i class="bi bi-graph-up"></i>Metrics
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main content -->
    <main class="main-content px-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>

    <!-- App JS -->
    <script src="{{ root_path }}/static/js/app.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
